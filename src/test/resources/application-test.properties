spring.application.name=my-route-mountain-log

# --- Database configuration (H2 In-Memory) ---
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Hibernate ddl-auto settings for testing
# テスト時は create-drop にしてスキーマをHibernateに生成させるか、
# または none にして schema.sql と data.sql を使うか選択
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true

# Hibernate 起動前にSQLスクリプトを実行しない（自動生成に任せる）
# もし初期データ(data.sql)を使いたい場合は、H2用の専用データセットを作るのが望ましい
spring.sql.init.mode=never

# --- Mail configuration ---
spring.mail.host=localhost
spring.mail.port=1025

# --- Stripe Configuration ---
stripe.api.key=sk_test_mock
stripe.public.key=pk_test_mock
stripe.premium.price.id=price_mock
stripe.success.url=http://localhost:8080/subscription/success
stripe.cancel.url=http://localhost:8080/subscription/register-cancel

#openweathermap
openweathermap.api.key=mock_api_key
