<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <div th:replace="~{fragments/common :: head('クレジットカード情報の編集')}"></div>
    <script src="https://js.stripe.com/v3/"></script>
</head>
<body class="bg-light">
    <!-- Header -->
    <div th:replace="~{fragments/common :: header}"></div>

    <main class="container my-5" style="max-width: 600px;">
        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <i class="bi bi-credit-card-2-front text-primary" style="font-size: 3rem;"></i>
                    <h2 class="mt-3 fw-bold">お支払い方法の変更</h2>
                    <p class="text-muted">プレミアムプランの決済に使用するクレジットカード情報を更新します。</p>
                </div>

                <!-- Current Card Info -->
                <div class="mb-4 p-3 bg-light rounded border border-light-subtle" th:if="${card != null}">
                    <h6 class="fw-bold text-muted mb-2">現在の登録カード情報</h6>
                    <div class="d-flex align-items-center">
                        <i class="bi bi-credit-card-fill fs-4 me-3 text-secondary"></i>
                        <div>
                            <span class="text-uppercase fw-bold" th:text="${card.brand}">VISA</span>
                            <span class="ms-2">**** **** **** <span th:text="${card.last4}">1234</span></span>
                            <div class="text-muted small mt-1">
                                <span>有効期限: </span>
                                <span th:text="${card.expMonth} + '/' + ${card.expYear}">12/2025</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Update Form -->
                <form id="payment-form" th:action="@{/subscription/update}" method="post">
                    <!-- Hidden input to store Stripe Public Key, fetched by JS -->
                    <input type="hidden" id="stripe-public-key" th:value="${stripePublicKey}">

                    <div class="mb-3">
                        <label for="card-holder-name" class="form-label fw-bold">カード名義人 (ローマ字)</label>
                        <input type="text" id="card-holder-name" class="form-control" th:value="${cardHolderName}" placeholder="TARO YAMADA" required>
                    </div>

                    <div class="mb-4">
                        <label for="card-element" class="form-label fw-bold">カード情報</label>
                        <div id="card-element" class="form-control" style="padding: 10px 12px; height: auto;">
                            <!-- A Stripe Element will be inserted here. -->
                        </div>
                        <!-- Used to display form errors. -->
                        <div id="card-errors" role="alert" class="text-danger mt-2 small fw-bold"></div>
                    </div>

                    <div class="d-grid gap-2 mt-4 pt-2 border-top">
                        <button type="submit" id="submit-button" class="btn btn-primary btn-lg rounded-pill fw-bold shadow-sm">
                           <i class="bi bi-check-circle me-1"></i> クレジットカードを更新する
                        </button>
                        <a th:href="@{/user/detail}" class="btn btn-outline-secondary rounded-pill mt-2">
                            キャンセル
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <div th:replace="~{fragments/common :: footer}"></div>
    <!-- Scripts -->
    <div th:replace="~{fragments/common :: scripts}"></div>

    <script th:inline="javascript">
        document.addEventListener("DOMContentLoaded", function() {
            var stripePublicKey = document.getElementById('stripe-public-key').value;
            if (!stripePublicKey) {
                console.error("Stripe public key is missing.");
                return;
            }

            var stripe = Stripe(stripePublicKey);
            var elements = stripe.elements({ locale: 'ja' });

            var cardElement = elements.create('card', {
                hidePostalCode: true,
                style: {
                    base: {
                        color: '#32325d',
                        fontFamily: '"Helvetica Neue", Helvetica, sans-serif',
                        fontSmoothing: 'antialiased',
                        fontSize: '16px',
                        '::placeholder': { color: '#aab7c4' }
                    },
                    invalid: {
                        color: '#fa755a',
                        iconColor: '#fa755a'
                    }
                }
            });

            cardElement.mount('#card-element');

            cardElement.on('change', function(event) {
                var displayError = document.getElementById('card-errors');
                if (event.error) {
                    displayError.textContent = event.error.message;
                } else {
                    displayError.textContent = '';
                }
            });

            var form = document.getElementById('payment-form');
            var submitButton = document.getElementById('submit-button');

            form.addEventListener('submit', function(event) {
                event.preventDefault();
                
                submitButton.disabled = true;
                submitButton.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> 処理中...';

                var cardHolderName = document.getElementById('card-holder-name').value;

                stripe.createPaymentMethod({
                    type: 'card',
                    card: cardElement,
                    billing_details: { name: cardHolderName }
                }).then(function(result) {
                    if (result.error) {
                        var errorElement = document.getElementById('card-errors');
                        errorElement.textContent = result.error.message;
                        submitButton.disabled = false;
                        submitButton.innerHTML = '<i class="bi bi-check-circle me-1"></i> クレジットカードを更新する';
                    } else {
                        stripePaymentMethodHandler(result.paymentMethod.id);
                    }
                });
            });

            function stripePaymentMethodHandler(paymentMethodId) {
                var form = document.getElementById('payment-form');
                var hiddenInput = document.createElement('input');
                hiddenInput.setAttribute('type', 'hidden');
                hiddenInput.setAttribute('name', 'paymentMethodId');
                hiddenInput.setAttribute('value', paymentMethodId);
                form.appendChild(hiddenInput);
                form.submit();
            }
        });
    </script>
</body>
</html>
