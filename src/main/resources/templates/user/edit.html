<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/common :: head(#{user.edit.title} + ' - My Route &amp; Mountain Log')}"></th:block>
</head>
<body>

    <!-- Include Header Fragment -->
    <div th:replace="~{fragments/common :: header}"></div>

    <main class="container" style="padding-top: 50px; padding-bottom: 80px;">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="form-card">
                    <div class="card-header text-center">
                        <h2 th:text="#{user.edit.title}">Edit Profile</h2>
                    </div>
                    <div class="card-body">

                        <form th:action="@{/user/update}" th:object="${userEditForm}" method="post" class="needs-validation" novalidate>
                            
                            <!-- Email (Readonly) -->
                            <div class="mb-3">
                                <label for="email" class="form-label" th:text="#{user.edit.label.email}">Email</label>
                                <input type="text" class="form-control" id="email" th:field="*{email}" readonly style="background-color: var(--color-bg-soft);">
                                <div class="form-text" style="font-size: 0.75rem; color: var(--color-text-muted);" th:text="#{user.edit.emailHint}">Email address cannot be changed.</div>
                            </div>

                            <div class="mb-3">
                                <label for="username" class="form-label"><span th:text="#{user.edit.label.username}">User Name</span> <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="username" th:field="*{username}" 
                                       th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                            </div>

                            <div class="mb-3">
                                <label for="address" class="form-label" th:text="#{user.edit.label.address}">Address</label>
                                <input type="text" class="form-control" id="address" th:field="*{address}" 
                                       th:classappend="${#fields.hasErrors('address')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></div>
                            </div>

                            <div class="mb-3">
                                <label for="birthDate" class="form-label" th:text="#{user.edit.label.birthDate}">Birth Date</label>
                                <input type="date" class="form-control" id="birthDate" th:field="*{birthDate}" 
                                       th:classappend="${#fields.hasErrors('birthDate')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('birthDate')}" th:errors="*{birthDate}"></div>
                            </div>

                            <div class="mb-4">
                                <label for="experienceLevel" class="form-label" th:text="#{user.edit.label.experience}">Experience Level</label>
                                <select class="form-select" id="experienceLevel" th:field="*{experienceLevel}">
                                    <option value="" selected th:text="#{user.edit.option.choose}">Choose...</option>
                                    <option value="BEGINNER" th:text="#{user.edit.option.beginner}">BEGINNER</option>
                                    <option value="INTERMEDIATE" th:text="#{user.edit.option.intermediate}">INTERMEDIATE</option>
                                    <option value="ADVANCED" th:text="#{user.edit.option.advanced}">ADVANCED</option>
                                </select>
                            </div>

                            <div class="d-flex justify-content-end gap-2">
                                <a th:href="@{/user}" class="btn btn-outline-custom" th:text="#{user.edit.cancel}">Cancel</a>
                                <button class="btn btn-primary-custom" type="submit" th:text="#{user.edit.save}">Update Profile</button>
                            </div>
                        
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Include Footer Fragment -->
    <div th:replace="~{fragments/common :: footer}"></div>

    <!-- Include Scripts Fragment -->
    <div th:replace="~{fragments/common :: scripts}"></div>
</body>
</html>
