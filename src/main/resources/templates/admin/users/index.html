<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head(#{admin.users.title})}">
</head>
<body class="bg-light">
    <!-- Admin Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm sticky-top">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" th:href="@{/admin/dashboard}">
                <i class="bi bi-shield-lock-fill text-warning me-2"></i><span th:text="#{admin.menu.dashboard}">Admin Dashboard</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#adminNavbar" aria-controls="adminNavbar" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="adminNavbar">
                <!-- Mobile Navigation (Visible only on sm/md screens) -->
                <ul class="navbar-nav d-md-none mb-2 border-bottom pb-2">
                    <li class="nav-item">
                        <a class="nav-link text-light" th:href="@{/admin/dashboard}"><i class="bi bi-house-door me-2"></i> <span th:text="#{admin.menu.dashboard}">ダッシュボード</span></a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-light" th:href="@{/admin/mountains}"><i class="bi bi-geo-alt me-2"></i> <span th:text="#{admin.menu.mountains}">山マスター管理</span></a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-light" th:href="@{/admin/users}"><i class="bi bi-people me-2"></i> <span th:text="#{admin.menu.users}">ユーザー管理</span></a>
                    </li>
                </ul>

                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center gap-2">
                    <!-- Language Switcher -->
                    <li class="nav-item dropdown me-2">
                        <a class="nav-link dropdown-toggle btn btn-sm btn-outline-secondary text-light border-0" href="#" id="adminLangDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="bi bi-globe2 me-1"></i> <span th:text="#{lang.switch}">Language</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow border-0" aria-labelledby="adminLangDropdown">
                            <li><a class="dropdown-item" href="#" onclick="changeLang('en')" th:text="#{lang.en}">English</a></li>
                            <li><a class="dropdown-item" href="#" onclick="changeLang('ja')" th:text="#{lang.ja}">Japanese</a></li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <span class="nav-link text-light"><i class="bi bi-person-badge me-1"></i> <span th:text="${#authentication.principal.user.username}">Admin</span>さん</span>
                    </li>
                    <li class="nav-item ms-3">
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-sm btn-outline-light rounded-pill px-3" th:text="#{nav.logout}">ログアウト</button>
                        </form>
                    </li>
                    <li class="nav-item ms-3">
                        <a th:href="@{/}" class="btn btn-sm btn-secondary rounded-pill px-3" target="_blank"><i class="bi bi-box-arrow-up-right"></i></a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar Navigation -->
            <nav id="sidebarMenu" class="col-md-3 col-lg-2 d-md-block bg-white sidebar collapse shadow-sm" style="min-height: calc(100vh - 56px);">
                <div class="position-sticky pt-4 px-3">
                    <h6 class="sidebar-heading d-flex justify-content-between align-items-center px-3 mt-2 mb-2 text-muted fw-bold text-uppercase">
                        <span>Menu</span>
                    </h6>
                    <ul class="nav flex-column mb-4">
                        <li class="nav-item">
                            <a class="nav-link text-muted" th:href="@{/admin/dashboard}">
                                <i class="bi bi-house-door me-2"></i> <span th:text="#{admin.menu.dashboard}">ダッシュボード</span>
                            </a>
                        </li>
                        <li class="nav-item mt-2">
                            <a class="nav-link text-muted" th:href="@{/admin/mountains}">
                                <i class="bi bi-geo-alt me-2"></i> <span th:text="#{admin.menu.mountains}">山マスター管理</span>
                            </a>
                        </li>
                        <li class="nav-item mt-2">
                            <a class="nav-link active bg-light bg-opacity-50 text-dark rounded fw-bold" aria-current="page" th:href="@{/admin/users}">
                                <i class="bi bi-people me-2 text-primary"></i> <span th:text="#{admin.menu.users}">ユーザー管理</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Main Content Area -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-5 py-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-4 border-bottom">
                    <h1 class="h2 fw-bold" th:text="#{admin.users.list} ?: 'ユーザー一覧'">ユーザー一覧</h1>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <a th:href="@{/admin/users/new}" class="btn btn-sm btn-primary shadow-sm rounded-pill px-3">
                            <i class="bi bi-person-plus-fill me-1"></i> <span th:text="#{admin.users.new} ?: 'ユーザー登録'">ユーザー登録</span>
                        </a>
                    </div>
                </div>

                <!-- Alert Messages -->
                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="bi bi-check-circle me-1"></i> <span th:text="${successMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="bi bi-exclamation-triangle me-1"></i> <span th:text="${errorMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <div class="card border-0 shadow-sm rounded-4 mb-4">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light text-muted small text-uppercase">
                                    <tr>
                                        <th class="ps-4" th:text="#{admin.users.id}">ID</th>
                                        <th th:text="#{admin.users.name}">ユーザー名</th>
                                        <th th:text="#{admin.users.email}">メールアドレス</th>
                                        <th th:text="#{admin.users.role}">権限</th>
                                        <th th:text="#{admin.users.registered_at}">登録日</th>
                                        <th class="text-center" th:text="#{admin.action.label} ?: '操作'">操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="user : ${userPage.content}">
                                        <td class="ps-4 fw-bold text-secondary" th:text="${user.userId}">1</td>
                                        <td>
                                            <div class="d-flex align-items-center">
                                                <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-flex align-items-center justify-content-center me-3" style="width: 40px; height: 40px;">
                                                    <i class="bi bi-person-fill"></i>
                                                </div>
                                                <div th:text="${user.username}" class="fw-bold">Taro Yamada</div>
                                            </div>
                                        </td>
                                        <td th:text="${user.email}">taro@example.com</td>
                                        <td>
                                            <span class="badge rounded-pill" 
                                                  th:classappend="${user.role.name == 'ROLE_ADMIN' ? 'bg-danger' : (user.role.name == 'ROLE_PREMIUM' ? 'bg-warning text-dark' : 'bg-secondary')}"
                                                  th:text="${user.role.name == 'ROLE_ADMIN' ? #messages.msg('admin.users.role.admin') : (user.role.name == 'ROLE_PREMIUM' ? #messages.msg('admin.users.role.premium') : #messages.msg('admin.users.role.user'))}">
                                                Role
                                            </span>
                                        </td>
                                        <td th:text="${#dates.format(user.createdAt, 'yyyy/MM/dd HH:mm')}">2023/01/01</td>
                                        <td class="text-nowrap" style="min-width: 120px;">
                                            <div class="d-flex justify-content-center gap-2">
                                                <a th:href="@{/admin/users/{id}/edit(id=${user.userId})}" class="btn btn-sm btn-outline-primary" style="padding: 0.25rem 0.5rem;" th:title="#{admin.action.edit} ?: '編集'">
                                                    <i class="bi bi-pencil-square"></i>
                                                </a>
                                                <form th:action="@{/admin/users/{id}/delete(id=${user.userId})}" method="post" class="d-inline"
                                                      onsubmit="return confirm('本当にこのユーザーを削除してもよろしいですか？');">
                                                    <button type="submit" class="btn btn-sm btn-outline-danger" style="padding: 0.25rem 0.5rem;" th:title="#{admin.action.delete} ?: '削除'">
                                                        <i class="bi bi-trash"></i>
                                                    </button>
                                                </form>
                                            </div>
                                        </td>
                                    </tr>
                                    <tr th:if="${userPage.empty}">
                                        <td colspan="6" class="text-center py-5 text-muted">
                                            <i class="bi bi-inbox fs-2 d-block mb-2"></i>
                                            <span th:text="#{admin.users.no_data}">ユーザーが見つかりません。</span>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Pagination -->
                <nav th:if="${userPage.totalPages > 1}" aria-label="Page navigation" class="mt-4">
                    <ul class="pagination justify-content-center">
                        <li class="page-item" th:classappend="${userPage.first} ? 'disabled'">
                            <a class="page-link shadow-sm border-0" th:href="@{/admin/users(page=${userPage.number - 1})}" aria-label="Previous">
                                <span aria-hidden="true">&laquo;</span>
                            </a>
                        </li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(0, userPage.totalPages - 1)}" 
                            th:classappend="${i == userPage.number} ? 'active'">
                            <a class="page-link shadow-sm border-0" th:href="@{/admin/users(page=${i})}" th:text="${i + 1}">1</a>
                        </li>
                        <li class="page-item" th:classappend="${userPage.last} ? 'disabled'">
                            <a class="page-link shadow-sm border-0" th:href="@{/admin/users(page=${userPage.number + 1})}" aria-label="Next">
                                <span aria-hidden="true">&raquo;</span>
                            </a>
                        </li>
                    </ul>
                </nav>
            </main>
        </div>
    </div>

    <!-- Script Fragment Integration -->
    <div th:replace="~{fragments/common :: scripts}"></div>
</body>
</html>
