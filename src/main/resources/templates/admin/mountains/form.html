<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>山データ編集 - My Route &amp; Mountain Log</title>
    <!-- CSS integration identical to dashboard -->
    <th:block th:replace="~{fragments/common :: head('山データ編集 - My Route &amp; Mountain Log')}"></th:block>
</head>
<body class="bg-light">
    <!-- Admin Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm sticky-top">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" th:href="@{/admin/dashboard}">
                <i class="bi bi-shield-lock-fill text-warning me-2"></i><span th:text="#{admin.menu.dashboard}">Admin Dashboard</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#adminNavbar" aria-controls="adminNavbar" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="adminNavbar">
                <!-- Mobile Navigation (Visible only on sm/md screens) -->
                <ul class="navbar-nav d-md-none mb-2 border-bottom pb-2">
                    <li class="nav-item">
                        <a class="nav-link text-light" th:href="@{/admin/dashboard}"><i class="bi bi-house-door me-2"></i> <span th:text="#{admin.menu.dashboard}">ダッシュボード</span></a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-light" th:href="@{/admin/mountains}"><i class="bi bi-geo-alt me-2"></i> <span th:text="#{admin.menu.mountains}">山マスター管理</span></a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-light" th:href="@{/admin/users}"><i class="bi bi-people me-2"></i> <span th:text="#{admin.menu.users}">ユーザー管理</span></a>
                    </li>
                </ul>

                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center gap-2">
                    <!-- Language Switcher -->
                    <li class="nav-item dropdown me-2">
                        <a class="nav-link dropdown-toggle btn btn-sm btn-outline-secondary text-light border-0" href="#" id="adminLangDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="bi bi-globe2 me-1"></i> <span th:text="#{lang.switch}">Language</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow border-0" aria-labelledby="adminLangDropdown">
                            <li><a class="dropdown-item" href="#" onclick="changeLang('en')" th:text="#{lang.en}">English</a></li>
                            <li><a class="dropdown-item" href="#" onclick="changeLang('ja')" th:text="#{lang.ja}">Japanese</a></li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <span class="nav-link text-light"><i class="bi bi-person-badge me-1"></i> <span th:text="${#authentication.principal.user.username}">Admin</span>さん</span>
                    </li>
                    <li class="nav-item ms-3">
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-sm btn-outline-light rounded-pill px-3" th:text="#{nav.logout}">ログアウト</button>
                        </form>
                    </li>
                    <li class="nav-item ms-3">
                        <a th:href="@{/}" class="btn btn-sm btn-secondary rounded-pill px-3" target="_blank"><i class="bi bi-box-arrow-up-right"></i></a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar Navigation -->
            <nav id="sidebarMenu" class="col-md-3 col-lg-2 d-md-block bg-white sidebar collapse shadow-sm" style="min-height: calc(100vh - 56px);">
                <div class="position-sticky pt-4 px-3">
                    <h6 class="sidebar-heading d-flex justify-content-between align-items-center px-3 mt-2 mb-2 text-muted fw-bold text-uppercase">
                        <span>Menu</span>
                    </h6>
                    <ul class="nav flex-column mb-4">
                        <li class="nav-item">
                            <a class="nav-link text-muted" th:href="@{/admin/dashboard}">
                                <i class="bi bi-house-door me-2"></i> <span th:text="#{admin.menu.dashboard}">ダッシュボード</span>
                            </a>
                        </li>
                        <li class="nav-item mt-2">
                            <a class="nav-link active bg-light bg-opacity-50 text-dark rounded fw-bold" aria-current="page" th:href="@{/admin/mountains}">
                                <i class="bi bi-geo-alt me-2 text-primary"></i> <span th:text="#{admin.menu.mountains}">山マスター管理</span>
                            </a>
                        </li>
                        <li class="nav-item mt-2">
                            <a class="nav-link text-muted" th:href="@{/admin/users}">
                                <i class="bi bi-people me-2"></i> <span th:text="#{admin.menu.users}">ユーザー管理</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Main Content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-5 py-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-4 border-bottom">
                    <h1 class="h2 fw-bold" th:text="${mountainForm.mountainId == null ? '山の新規登録' : '山の編集'}">山の編集</h1>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <a th:href="@{/admin/mountains}" class="btn btn-sm btn-outline-secondary">
                            <i class="bi bi-arrow-left me-1"></i> 一覧へ戻る
                        </a>
                    </div>
                </div>

                <div class="card border-0 shadow-sm rounded-4 mb-5">
                    <div class="card-body p-4 p-md-5">
                        
                        <!-- Using unified form based on Form backing bean -->
                        <form th:action="${mountainForm.mountainId == null ? '/admin/mountains/create' : '/admin/mountains/' + mountainForm.mountainId + '/update'}" 
                              th:object="${mountainForm}" method="post">
                            
                            <!-- Display global errors if any -->
                            <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger" role="alert">
                                <ul class="mb-0">
                                    <li th:each="err : ${#fields.globalErrors()}" th:text="${err}">Global Error</li>
                                </ul>
                            </div>

                            <div class="row g-4">
                                <!-- Mountain Name -->
                                <div class="col-md-6">
                                    <label for="name" class="form-label fw-bold">山名 <span class="badge bg-danger ms-1">必須</span></label>
                                    <input type="text" class="form-control" id="name" th:field="*{name}" th:errorclass="is-invalid" required>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">エラーメッセージ</div>
                                </div>
                                <div class="col-md-6">
                                    <label for="nameKana" class="form-label fw-bold">よみがな</label>
                                    <input type="text" class="form-control" id="nameKana" th:field="*{nameKana}" th:errorclass="is-invalid">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('nameKana')}" th:errors="*{nameKana}">エラーメッセージ</div>
                                </div>

                                <!-- Elevation & Prefecture -->
                                <div class="col-md-4">
                                    <label for="elevation" class="form-label fw-bold">標高 (m) <span class="badge bg-danger ms-1">必須</span></label>
                                    <input type="number" class="form-control" id="elevation" th:field="*{elevation}" th:errorclass="is-invalid" required>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('elevation')}" th:errors="*{elevation}">エラーメッセージ</div>
                                </div>
                                <div class="col-md-8">
                                    <label for="prefecture" class="form-label fw-bold">都道府県</label>
                                    <input type="text" class="form-control" id="prefecture" th:field="*{prefecture}" placeholder="例: 静岡県 / 山梨県" th:errorclass="is-invalid">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('prefecture')}" th:errors="*{prefecture}">エラーメッセージ</div>
                                </div>

                                <!-- Typical Stats -->
                                <div class="col-12 mt-4">
                                    <h6 class="fw-bold border-bottom pb-2">標準コースタイムと難易度</h6>
                                </div>
                                <div class="col-md-4">
                                    <label for="typicalDurationMinutes" class="form-label fw-bold">標準所要時間 (分)</label>
                                    <input type="number" class="form-control" id="typicalDurationMinutes" th:field="*{typicalDurationMinutes}" th:errorclass="is-invalid">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('typicalDurationMinutes')}" th:errors="*{typicalDurationMinutes}">エラーメッセージ</div>
                                </div>
                                <div class="col-md-4">
                                    <label for="typicalElevationGain" class="form-label fw-bold">累積標高 (m)</label>
                                    <input type="number" class="form-control" id="typicalElevationGain" th:field="*{typicalElevationGain}" th:errorclass="is-invalid">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('typicalElevationGain')}" th:errors="*{typicalElevationGain}">エラーメッセージ</div>
                                </div>
                                <div class="col-md-4">
                                    <label for="difficulty" class="form-label fw-bold">ルート難易度</label>
                                    <select class="form-select" id="difficulty" th:field="*{difficulty}" th:errorclass="is-invalid">
                                        <option value="">選択してください</option>
                                        <option value="EASY">EASY (初級)</option>
                                        <option value="MODERATE">MODERATE (中級)</option>
                                        <option value="HARD">HARD (上級)</option>
                                    </select>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('difficulty')}" th:errors="*{difficulty}">エラーメッセージ</div>
                                </div>

                                <!-- Is Hyakumeizan Toggle -->
                                <div class="col-12">
                                    <div class="form-check form-switch mt-3">
                                        <input class="form-check-input" type="checkbox" role="switch" id="isHyakumeizan" th:field="*{isHyakumeizan}">
                                        <label class="form-check-label fw-bold text-danger" for="isHyakumeizan"><i class="bi bi-star-fill me-1"></i>日本百名山に指定する</label>
                                    </div>
                                </div>

                                <!-- Description -->
                                <div class="col-12 mt-4">
                                    <label for="description" class="form-label fw-bold">山の概要・説明文</label>
                                    <textarea class="form-control" id="description" rows="4" th:field="*{description}" th:errorclass="is-invalid"></textarea>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}" th:errors="*{description}">エラーメッセージ</div>
                                </div>

                            </div>

                            <!-- Submit Button -->
                            <div class="mt-5 text-end border-top pt-4">
                                <a th:href="@{/admin/mountains}" class="btn btn-light me-2">キャンセル</a>
                                <button type="submit" class="btn btn-primary px-5 fw-bold shadow-sm">
                                    <i class="bi bi-check-circle me-1"></i> <span th:text="${mountainForm.mountainId == null ? '登録する' : '保存する'}">保存する</span>
                                </button>
                            </div>
                        </form>

                    </div>
                </div>

            </main>
        </div>
    </div>

    <!-- Script Fragment Integration -->
    <div th:replace="~{fragments/common :: scripts}"></div>
</body>
</html>
