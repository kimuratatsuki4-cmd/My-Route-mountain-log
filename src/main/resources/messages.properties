# --- Premium Gear Guide ---
premium.guide.title=First-Time "Three Sacred Treasures" Concierge
premium.guide.subtitle=The most important and expensive items for mountain climbing: "Trekking Shoes, Backpack, and Rainwear".<br class="d-none d-md-block">Our official concierge will guide you on how to choose safely without making mistakes, and introduce you to "classic items with no regrets".
premium.guide.alert.title=Don't just choose by price; invest for safety
premium.guide.alert.desc=In nature, sudden changes in weather and environment can put your life at risk. The Three Sacred Treasures are your lifeline. Choosing "reliable quality without regret" is the first step to enjoying mountaineering safely for a long time.

premium.guide.badge.exclusive=Premium Exclusive
premium.guide.badge.required=Required
premium.guide.badge.recommended=Official Recommendation
premium.guide.why=Why is this necessary?
premium.guide.points=Points to choose
premium.guide.check_amazon=Check on Amazon

# Shoes
premium.guide.shoes.title=Trekking Shoes
premium.guide.shoes.subtitle=(Trekking Boots)
premium.guide.shoes.why=It is essential even for day hikes to protect your ankles and prevent falls and fatigue on rough roads. Sneakers are slippery and can cause foot pain from tree roots and pebbles.
premium.guide.shoes.point1.title=Mid-cut or higher
premium.guide.shoes.point1.desc=Holds the ankle firmly to prevent sprains when fatigued.
premium.guide.shoes.point2.title=Waterproof & Breathable (e.g., GORE-TEX)
premium.guide.shoes.point2.desc=Protects your feet from puddles, mud, and sudden rain, while releasing sweat to the outside.
premium.guide.shoes.point3.title=Hard sole with high grip
premium.guide.shoes.point3.desc=When walking on uneven terrain, it reduces the burden of thrusting to the sole of the foot and securely grips the ground.
premium.guide.shoes.rec.title=[Caravan] C1_02S
premium.guide.shoes.rec.desc=A classic model for mountain climbing beginners made to fit Japanese foot shapes. It offers plenty of room in the toes and is easy to fit even on feet with high insteps and wide widths, providing guaranteed ease of wear and peace of mind.

# Backpack
premium.guide.backpack.title=Backpack
premium.guide.backpack.subtitle=(Rucksack)
premium.guide.backpack.why=To comfortably carry essentials such as winter clothes, rainwear, and a water bottle. Unlike city backpacks, it has a structure that disperses the load and makes you less tired. Keeping both hands free is the basics of mountain climbing.
premium.guide.backpack.point1.title=Capacity 20-30L
premium.guide.backpack.point1.desc=For a day hike, this is the perfect size to hold a lunch, rainwear, winter clothes, etc.
premium.guide.backpack.point2.title=With waist belt (hip belt)
premium.guide.backpack.point2.desc=By supporting the weight not only on your shoulders but also on your waist and pelvis, it dramatically reduces the burden on your shoulders.
premium.guide.backpack.point3.title=Back breathability
premium.guide.backpack.point3.desc=There is a gap or mesh between the back and the backpack, letting sweat escape and keeping you comfortable.
premium.guide.backpack.rec.title=[Millet] SAAS FEE 30+5
premium.guide.backpack.rec.desc=A fit so good it is said that you "wear it rather than carry it on your back". A classic all-round model with easy-to-use pocket placement that satisfies beginners to advanced users.

# Rainwear
premium.guide.rainwear.title=Rainwear
premium.guide.rainwear.subtitle=(Top and bottom set)
premium.guide.rainwear.why=Mountain weather changes quickly, and you may be caught in a sudden rain even when sunny is forecast. If your body gets wet at high altitudes or windy places, your body temperature is rapidly stolen, leading to life-threatening dangers such as hypothermia, so be sure to carry it.
premium.guide.rainwear.point1.title=Top and bottom separate type
premium.guide.rainwear.point1.desc=Ponchos are not suitable for mountain climbing because they flap in the wind and your feet get wet.
premium.guide.rainwear.point2.title=Waterproof & Breathable material (e.g., GORE-TEX)
premium.guide.rainwear.point2.desc=A function that prevents rain from the outside and at the same time lets large amounts of sweat (stuffiness) inside due to exercise escape to the outside is essential.
premium.guide.rainwear.point3.title=Lightweight and compact
premium.guide.rainwear.point3.desc=Since there are actually many days when you don't use it (sunny), ease of carrying is also important.
premium.guide.rainwear.rec.title=[mont-bell] Storm Cruiser
premium.guide.rainwear.rec.desc=Adopting GORE-TEX, it is a masterpiece model that is said to be the "No. 1 ownership rate among mountaineers", holding top-class performance for its lightweight and highly functional design, while also keeping the price down.

