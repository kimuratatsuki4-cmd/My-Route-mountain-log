# --- Premium Gear Guide ---
premium.guide.title=はじめての「三種の神器」コンシェルジュ
premium.guide.subtitle=登山において最も重要かつ高価な「登山靴・バックパック・レインウェア」。<br class="d-none d-md-block">公式コンシェルジュが、安全で失敗しない選び方と「間違いのない定番品」をご案内します。
premium.guide.alert.title=安さだけで選ばない、安全のための投資を
premium.guide.alert.desc=自然の中では、天候や環境の急変により命の危険に晒されることがあります。三種の神器はあなたの身を守る命綱です。「後悔しない確かな品質」を選ぶことが、登山を長く安全に楽しむための第一歩です。

premium.guide.badge.exclusive=Premium Exclusive
premium.guide.badge.required=必須
premium.guide.badge.recommended=公式おすすめモデル
premium.guide.why=なぜ必要なの？
premium.guide.points=選ぶポイント
premium.guide.check_amazon=Amazonでチェック

# Shoes
premium.guide.shoes.title=登山靴
premium.guide.shoes.subtitle=(トレッキングブーツ)
premium.guide.shoes.why=足首を保護し、悪路での転倒や疲労を防ぐために日帰り登山でも必須です。スニーカーでは滑りやすく、木の根や小石で足を痛める原因になります。
premium.guide.shoes.point1.title=ミドルカット以上
premium.guide.shoes.point1.desc=足首をしっかりとホールドし、疲労時の捻挫を未然に防ぎます。
premium.guide.shoes.point2.title=防水透湿性 (GORE-TEX等)
premium.guide.shoes.point2.desc=水たまりや泥、にわか雨から足を守り、汗蒸れは外へ逃がします。
premium.guide.shoes.point3.title=グリップ力の高い硬いソール
premium.guide.shoes.point3.desc=不整地を歩く際、足裏への突き上げ負担を和らげ、確実に地面をグリップします。
premium.guide.shoes.rec.title=[キャラバン] C1_02S
premium.guide.shoes.rec.desc=日本人の足形に合わせて作られた、登山入門者の大定番モデル。つま先ゆったりで甲高幅広な足にも合いやすく、履きやすさと安心感は折り紙付きです。

# Backpack
premium.guide.backpack.title=バックパック
premium.guide.backpack.subtitle=(リュックサック)
premium.guide.backpack.why=防寒着や雨具、水筒などの必需品を快適に運ぶため。街用のリュックとは違い、荷重を分散させ疲れにくくする構造になっています。両手を常に空けておくことは登山の基本です。
premium.guide.backpack.point1.title=容量 20〜30L
premium.guide.backpack.point1.desc=日帰り登山において、お弁当・雨具・防寒着などが丁度収まるベストサイズです。
premium.guide.backpack.point2.title=腰ベルト（ヒップベルト）付き
premium.guide.backpack.point2.desc=肩だけでなく腰や骨盤で重さを支えることで、肩への負担を劇的に減らします。
premium.guide.backpack.point3.title=背面通気性
premium.guide.backpack.point3.desc=背中とバックパックの間に隙間やメッシュがあり、汗を逃がして快適性を保ちます。
premium.guide.backpack.rec.title=[ミレー] サースフェー 30+5
premium.guide.backpack.rec.desc=「背負うのではなく着る」と言われるほどのフィット感。使いやすいポケット配置と、初心者から上級者まで満足させるオールラウンドな王道モデルです。

# Rainwear
premium.guide.rainwear.title=レインウェア
premium.guide.rainwear.subtitle=(上下セット)
premium.guide.rainwear.why=山の天気は変わりやすく、晴れ予報でも突然の雨に見舞われることがあります。標高が高い場所や風が吹く場所で体が濡れると、急激に体温を奪われ低体温症などの命に関わる危険を招くため、必ず携行する必要があります。
premium.guide.rainwear.point1.title=上下セパレート型
premium.guide.rainwear.point1.desc=ポンチョは風で煽られたり、足元が濡れてしまうため登山には適しません。
premium.guide.rainwear.point2.title=防水透湿素材 (GORE-TEX等)
premium.guide.rainwear.point2.desc=外からの雨を防ぐと同時に、運動による内側の大量の汗（蒸れ）を外へ逃がす機能が必須です。
premium.guide.rainwear.point3.title=軽量・コンパクト
premium.guide.rainwear.point3.desc=実際には使わない（晴れている）日も多いため、持ち運びのしやすさも重要です。
premium.guide.rainwear.rec.title=[モンベル] ストームクルーザー
premium.guide.rainwear.rec.desc=GORE-TEXを採用し、軽量・高機能でトップクラスの性能を持ちながら、価格も抑えられた「登山者の所有率No.1」と言われる傑作モデルです。

